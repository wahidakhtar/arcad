services:
  arcad-db:
    image: postgres:16-alpine
    container_name: arcad-db
    restart: always
    environment:
      POSTGRES_USER: arcad
      POSTGRES_PASSWORD: arcad123
      POSTGRES_DB: arcad_db
    ports:
      - "5432:5432"
    volumes:
      - arcad_pgdata:/var/lib/postgresql/data

  arcad-api:
    build: .
    container_name: arcad-api
    restart: always
    depends_on:
      - arcad-db
    environment:
      DATABASE_URL: postgresql://arcad:arcad123@arcad-db:5432/arcad_db
    ports:
      - "8000:8000"

volumes:
  arcad_pgdata:
